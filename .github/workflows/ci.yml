name: CI

on:
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Validate HTML
        run: |
          npx --yes html-validate src/hello-world/index.html src/hello-world/about.html
